<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>초대형 깔끔 하트 화면</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #fff5f7; /* 부드러운 핑크빛 배경 */
            width: 100%;
            height: 100%;
        }
        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }
    </style>
</head>
<body>

    <canvas id="heartCanvas"></canvas>

    <script>
        const canvas = document.getElementById('heartCanvas');
        const ctx = canvas.getContext('2d');

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        const heartTypes = ['❤️', '💖', '💝', '💕', '💗'];
        const particles = [];

        class HeartParticle {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.text = heartTypes[Math.floor(Math.random() * heartTypes.length)];
                
                // --- 핵심 수정: 하트 크기를 극단적으로 키움 ---
                // 화면 너비의 30%에서 70% 사이의 거대한 크기로 설정
                const minSize = Math.min(canvas.width, canvas.height) * 0.3;
                const maxSize = Math.min(canvas.width, canvas.height) * 0.7;
                this.size = Math.random() * (maxSize - minSize) + minSize; 
                
                // 거대한 하트가 천천히 웅장하게 움직이도록 속도 설정
                this.speedX = (Math.random() - 0.5) * 1;
                this.speedY = -(Math.random() * 1 + 0.5);
                
                this.opacity = 1;
                // 크기가 큰 만큼 더 천천히 사라지도록 설정 (더 오래 화면에 머뭄)
                this.fadeSpeed = Math.random() * 0.002 + 0.001; 
            }

            update() {
                this.x += this.speedX;
                this.y += this.speedY;
                this.opacity -= this.fadeSpeed;
            }

            draw() {
                ctx.save();
                // 깔끔한 효과를 위해 투명도를 적용하되, 수명이 다하면 바로 삭제되도록 유도
                ctx.globalAlpha = Math.max(0, this.opacity);
                
                // 폰트 크기를 거대하게 설정
                ctx.font = `${this.size}px Arial`;
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText(this.text, this.x, this.y);
                ctx.restore();
            }
        }

        function animate() {
            // 잔상 효과 제거: 매 프레임마다 배경을 깨끗하게 새로 지웁니다.
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#fff5f7';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // 거대한 하트가 화면을 너무 꽉 채우지 않도록 생성 빈도를 조절
            // 화면 밑에서 솟아오르는 하트 빈도
            if (Math.random() < 0.1) { 
                const rx = Math.random() * canvas.width;
                // 거대한 하트가 화면 밑에서 완전히 올라오도록 시작 위치 조절
                const ry = canvas.height + Math.min(canvas.width, canvas.height) * 0.5;
                particles.push(new HeartParticle(rx, ry));
            }

            // 화면 중간에서도 간혹 생성
            if (Math.random() < 0.02) {
                const rx = Math.random() * canvas.width;
                const ry = Math.random() * canvas.height;
                particles.push(new HeartParticle(rx, ry));
            }

            for (let i = particles.length - 1; i >= 0; i--) {
                particles[i].update();
                particles[i].draw();

                // 수명이 다한 하트는 즉시 배열에서 제거
                if (particles[i].opacity <= 0) {
                    particles.splice(i, 1);
                }
            }

            requestAnimationFrame(animate);
        }

        animate();
    </script>
</body>
</html>
